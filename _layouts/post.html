---
layout: default
---

<article class="post">
  <h2>{{ page.title }}</h2>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  {% include disqus.html %}
</article>


    <!-- Stuff for jsarr tag  -->

    {% for js in page.jsarr %}
      <script type="text/javascript">
         {% include {{ js }} %}
      </script>
    {% endfor %}

    <!-- End Stuff for jsarr tag  -->
